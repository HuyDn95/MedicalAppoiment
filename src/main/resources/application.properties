jdbc.driverClassName=com.mysql.cj.jdbc.Driver
jdbc.url=jdbc:mysql://localhost:3306/clinic_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&createDatabaseIfNotExist=true
jdbc.username=root
jdbc.password=root

# ==== HikariCP Connection Pool ====
hikari.maximumPoolSize=10
hikari.minimumIdle=2
hikari.idleTimeout=30000
hikari.connectionTimeout=20000
hikari.poolName=ClinicHikariPool

# ==== Hibernate (dùng bởi HibernateConfig) ====
hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.show_sql=true
hibernate.format_sql=true
hibernate.hbm2ddl.auto=update
hibernate.packagesToScan=com.clinic.model

# ==== JSP View Resolver ====
view.prefix=/WEB-INF/views/
view.suffix=.jsp

# ==== Application Info ====
app.name=Medical Appointment System
app.version=1.0.0
app.timezone=Asia/Ho_Chi_Minh

# ==== Logging ====
logging.level.com.clinic=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG